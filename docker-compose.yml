services:
  # ─────────────────────────────────────────
  # MySQL Database
  # ─────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: disaster-response-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - disaster-response-network

  # ─────────────────────────────────────────
  # Backend API — port 5001 (avoids conflict)
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: disaster-response-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: ${NODE_ENV}
      PORT: 5000
    ports:
      - "5001:5000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - disaster-response-network

  ddl-docs:
    image: alpine:latest
    container_name: disaster-response-ddl-docs
    restart: unless-stopped
    volumes:
      - ./backend/prisma/ddl_plain_sql.sql:/ddl/schema.sql:ro
    command: sh -c "echo 'DDL Schema loaded at /ddl/schema.sql - 14 tables documented' && tail -f /dev/null"
    networks:
      - disaster-response-network

volumes:
  mysql_data:
    name: disaster-response-mysql-data

networks:
  disaster-response-network:
    driver: bridge
